name: Build website

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/game/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/game/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
      release_date: ${{ steps.meta.outputs.date }}
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set release tag
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="website-${DATE}-${{ github.run_number }}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Rava.slnx

      - name: Build
        run: dotnet build Rava.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Rava.slnx --configuration Release --no-build --verbosity normal

      - name: Validate web JavaScript
        run: node --check Rava.Api/html/js/api.js Rava.Api/html/js/app.js Rava.Api/html/js/exonet.js

      - name: Publish web app
        run: |
          dotnet publish Rava.Api/Rava.Api.csproj --configuration Release --output ./publish
          rsync -a Rava.Api/html/ publish/html/
          dotnet publish Rava.Status/Rava.Status.csproj --configuration Release --output ./publish-status
          dotnet publish Rava.Admin/Rava.Admin.csproj --configuration Release --output ./publish-admin
          dotnet publish Rava.Moderator/Rava.Moderator.csproj --configuration Release --output ./publish-moderator
          dotnet publish Rava.Docs/Rava.Docs.csproj --configuration Release --output ./publish-docs
          rsync -a publish-status/ publish/ --exclude 'appsettings.json' --exclude 'appsettings.Development.json'
          rsync -a publish-admin/ publish/ --exclude 'appsettings.json' --exclude 'appsettings.Development.json'
          rsync -a publish-moderator/ publish/ --exclude 'appsettings.json' --exclude 'appsettings.Development.json'
          rsync -a publish-docs/ publish/ --exclude 'appsettings.json' --exclude 'appsettings.Development.json'
          cp -f Rava.Api/*.csv publish/
          test -f publish/credits.csv
          test -f publish/market-items.csv
          test -f publish/hate-speech-terms.csv

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: rava-website
          path: server/publish/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: rava-website
          path: publish

      - name: Create release archive
        run: zip -r "rava-website-${{ needs.build.outputs.release_tag }}.zip" publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Website ${{ needs.build.outputs.release_tag }}
          body: |
            Automated website release.

            - **Tag:** `${{ needs.build.outputs.release_tag }}`
            - **Date (UTC):** ${{ needs.build.outputs.release_date }}
            - **Build number:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download `rava-website-*.zip`, extract `publish/`, copy `appsettings.json.example` to `appsettings.json`, configure secrets, then run:

            - **`Rava.Api.dll`** — port 5000
            - **`Rava.Status.dll`** — port 6000 (same folder; add `StatusMonitor` section to `appsettings.json`)
            - **`Rava.Admin.dll`** — port 7000 (same folder; add `AdminPortal` section to `appsettings.json`)
            - **`Rava.Moderator.dll`** — port 7050 (same folder; add `ModeratorPortal` section to `appsettings.json`)
            - **`Rava.Docs.dll`** — port 9000 (same folder; add `DocsPortal` section to `appsettings.json`)
          files: rava-website-*.zip
          generate_release_notes: true

  deploy:
    name: Deploy to production
    needs: build
    if: github.event_name != 'pull_request' && vars.ENABLE_PRODUCTION_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST || 'binarygeek119.duckdns.org' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER || 'root' }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_WWW_PATH: ${{ vars.DEPLOY_WWW_PATH || secrets.DEPLOY_WWW_PATH || '/var/www/publish' }}
      DEPLOY_API_PATH: ${{ vars.DEPLOY_API_PATH || secrets.DEPLOY_API_PATH || '/var/www/publish' }}
      DEPLOY_WWW_HOST: ${{ vars.DEPLOY_WWW_HOST || secrets.DEPLOY_WWW_HOST || '' }}
      DEPLOY_API_HOST: ${{ vars.DEPLOY_API_HOST || secrets.DEPLOY_API_HOST || '' }}
      DEPLOY_API_SERVICE: ${{ vars.DEPLOY_API_SERVICE || secrets.DEPLOY_API_SERVICE || 'rava-api' }}
      DEPLOY_STATUS_SERVICE: ${{ vars.DEPLOY_STATUS_SERVICE || secrets.DEPLOY_STATUS_SERVICE || 'rava-status' }}
      DEPLOY_ADMIN_SERVICE: ${{ vars.DEPLOY_ADMIN_SERVICE || secrets.DEPLOY_ADMIN_SERVICE || 'rava-admin' }}
      DEPLOY_MODERATOR_SERVICE: ${{ vars.DEPLOY_MODERATOR_SERVICE || secrets.DEPLOY_MODERATOR_SERVICE || 'rava-moderator' }}
      DEPLOY_DOCS_SERVICE: ${{ vars.DEPLOY_DOCS_SERVICE || secrets.DEPLOY_DOCS_SERVICE || 'rava-docs' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: rava-website
          path: publish

      - name: Ensure html is in publish bundle
        run: rsync -a server/Rava.Api/html/ publish/html/

      - name: Detect deploy auth method
        id: auth
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "method=key" >> "$GITHUB_OUTPUT"
          elif [ -n "$DEPLOY_SSH_PASSWORD" ]; then
            echo "method=password" >> "$GITHUB_OUTPUT"
          else
            echo "Configure DEPLOY_SSH_KEY or DEPLOY_SSH_PASSWORD in repository secrets." >&2
            echo "See docs/github-deploy-setup.md" >&2
            exit 1
          fi

      - name: Setup SSH (key)
        if: steps.auth.outputs.method == 'key'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup SSH (password)
        if: steps.auth.outputs.method == 'password'
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Normalize deploy settings
        run: |
          set -euo pipefail
          normalize_host() {
            local h="${1:-}"
            h="${h#https://}"
            h="${h#http://}"
            h="${h%%/*}"
            h="${h%%:*}"
            h="$(printf '%s' "$h" | tr -d '[:space:]')"
            printf '%s' "$h"
          }
          normalize_path() {
            local p="${1:-}"
            p="$(printf '%s' "$p" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            # Strip accidental rsync destination pasted into a path variable.
            if [[ "$p" =~ ^[^/@[:space:]]+@[^:]+:(/.+)$ ]]; then
              p="${BASH_REMATCH[1]}"
            elif [[ "$p" =~ ^[^/@[:space:]]+:(/.+)$ ]]; then
              p="${BASH_REMATCH[1]}"
            fi
            while [[ "$p" == */ ]] && [[ "$p" != "/" ]]; do
              p="${p%/}"
            done
            printf '%s' "$p"
          }
          validate_path() {
            local name="$1"
            local p="$2"
            if [ -z "$p" ]; then
              echo "ERROR: ${name} is empty. Use an absolute path, e.g. /var/www/publish." >&2
              exit 1
            fi
            if [[ "$p" != /* ]]; then
              echo "ERROR: ${name} must start with / (got '${p}'). Do not include user@host: — set DEPLOY_HOST and DEPLOY_USER separately." >&2
              exit 1
            fi
            if [[ "$p" == *@* ]] || [[ "$p" == *:* ]]; then
              echo "ERROR: ${name} must be a filesystem path only (got '${p}'). Use /var/www/publish, not user@host:/var/www/publish." >&2
              exit 1
            fi
            if [ "$p" = "/var/www" ]; then
              echo "ERROR: ${name} must not be /var/www alone — that drops html, wwwroot, and .aspnet beside publish." >&2
              echo "Use /var/www/publish for API + portals + game html (recommended)." >&2
              exit 1
            fi
            if [ "$p" = "/var/www/html" ] || [ "$p" = "/var/www/wwwroot" ]; then
              echo "ERROR: ${name} should be /var/www/publish, not a subfolder created by a bad deploy (${p})." >&2
              exit 1
            fi
          }

          host="$(normalize_host "$DEPLOY_HOST")"
          if [ -z "$host" ]; then
            echo "DEPLOY_HOST is empty. Set it to your server hostname (e.g. binarygeek119.duckdns.org)." >&2
            exit 1
          fi
          if ! [[ "$host" =~ ^[A-Za-z0-9]([A-Za-z0-9.-]*[A-Za-z0-9])?$ ]]; then
            echo "ERROR: DEPLOY_HOST '${host}' is not a valid hostname. Use hostname only — no https://, paths, or spaces." >&2
            exit 1
          fi
          echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"

          www_host="$(normalize_host "${DEPLOY_WWW_HOST:-}")"
          api_host="$(normalize_host "${DEPLOY_API_HOST:-}")"
          echo "DEPLOY_WWW_HOST=$www_host" >> "$GITHUB_ENV"
          echo "DEPLOY_API_HOST=$api_host" >> "$GITHUB_ENV"

          user="$(printf '%s' "$DEPLOY_USER" | tr -d '[:space:]')"
          if [ -z "$user" ]; then
            echo "DEPLOY_USER is empty." >&2
            exit 1
          fi
          echo "DEPLOY_USER=$user" >> "$GITHUB_ENV"

          port="$(printf '%s' "$DEPLOY_SSH_PORT" | tr -d '[:space:]')"
          if ! [[ "$port" =~ ^[0-9]+$ ]] || [ "$port" -lt 1 ] || [ "$port" -gt 65535 ]; then
            echo "ERROR: DEPLOY_SSH_PORT must be 1-65535, got '${port}'." >&2
            exit 1
          fi
          echo "DEPLOY_SSH_PORT=$port" >> "$GITHUB_ENV"

          www_path="$(normalize_path "$DEPLOY_WWW_PATH")"
          api_path="$(normalize_path "$DEPLOY_API_PATH")"
          validate_path "DEPLOY_WWW_PATH" "$www_path"
          validate_path "DEPLOY_API_PATH" "$api_path"
          echo "DEPLOY_WWW_PATH=$www_path" >> "$GITHUB_ENV"
          echo "DEPLOY_API_PATH=$api_path" >> "$GITHUB_ENV"

          effective_www_host="${www_host:-$host}"
          effective_api_host="${api_host:-$host}"
          if [ "$effective_www_host" = "$effective_api_host" ] && { [ "$www_path" = "$api_path" ] || [ "$www_path" = "${api_path}/html" ]; }; then
            echo "DEPLOY_SKIP_WWW_RSYNC=true" >> "$GITHUB_ENV"
            echo "DEPLOY_WWW_PATH is under publish — game html ships in publish/html/ (skipping separate www rsync)."
          else
            echo "DEPLOY_SKIP_WWW_RSYNC=false" >> "$GITHUB_ENV"
          fi

          echo "Deploy targets:"
          if [ "${DEPLOY_SKIP_WWW_RSYNC:-false}" = "true" ]; then
            echo "  publish (api + html + portals): ${user}@${effective_api_host}:${api_path}/"
          else
            echo "  www: ${user}@${effective_www_host}:${www_path}/"
            echo "  api: ${user}@${effective_api_host}:${api_path}/"
          fi

      - name: Add SSH host keys
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          unique_hosts=()
          for host in "$DEPLOY_HOST" "$DEPLOY_WWW_HOST" "$DEPLOY_API_HOST"; do
            host="${host#https://}"
            host="${host#http://}"
            host="${host%%/*}"
            host="${host%%:*}"
            host="$(printf '%s' "$host" | tr -d '[:space:]')"
            if [ -n "$host" ]; then
              duplicate=0
              for seen in "${unique_hosts[@]:-}"; do
                if [ "$seen" = "$host" ]; then
                  duplicate=1
                  break
                fi
              done
              if [ "$duplicate" -eq 0 ]; then
                unique_hosts+=("$host")
              fi
            fi
          done

          if [ "${#unique_hosts[@]}" -eq 0 ]; then
            echo "No deploy host configured. Set repository variable DEPLOY_HOST (hostname only, e.g. binarygeek119.duckdns.org)." >&2
            exit 1
          fi

          failed=0
          for host in "${unique_hosts[@]}"; do
            echo "Checking SSH reachability for ${host}:${DEPLOY_SSH_PORT}..."
            if ! getent ahosts "$host" >/dev/null; then
              echo "ERROR: DNS lookup failed for '${host}'. Check DEPLOY_HOST in GitHub Actions variables." >&2
              failed=1
              continue
            fi
            getent ahosts "$host" | head -n 3

            if ! timeout 15 bash -c "exec 3<>/dev/tcp/${host}/${DEPLOY_SSH_PORT}" 2>/dev/null; then
              echo "ERROR: Cannot open TCP ${host}:${DEPLOY_SSH_PORT} from GitHub Actions." >&2
              echo "On the server: ensure sshd listens on 0.0.0.0:${DEPLOY_SSH_PORT}, firewall allows inbound SSH, and router forwards port ${DEPLOY_SSH_PORT} if needed." >&2
              failed=1
              continue
            fi

            scan_err="$(mktemp)"
            if ! ssh-keyscan -T 15 -H -p "$DEPLOY_SSH_PORT" "$host" >> ~/.ssh/known_hosts 2>"$scan_err"; then
              echo "ERROR: ssh-keyscan failed for ${host}:${DEPLOY_SSH_PORT}." >&2
              sed 's/^/  /' "$scan_err" >&2
              failed=1
            else
              echo "Added host key for ${host}:${DEPLOY_SSH_PORT}"
            fi
            rm -f "$scan_err"
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Ensure remote deploy directories exist
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ "$DEPLOY_USER" = "root" ]; then
            mkdir_cmd="mkdir -p"
          else
            mkdir_cmd="sudo mkdir -p"
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$1" "$2"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$1" "$2"
            fi
          }

          ensure_dir() {
            local host="$1"
            local path="$2"
            local label="$3"
            local remote="${DEPLOY_USER}@${host}"
            echo "Ensuring ${label} directory exists: ${path}"
            run_remote "$remote" "${mkdir_cmd} '${path}'"
          }

          www_host="${DEPLOY_WWW_HOST:-$DEPLOY_HOST}"
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          if [ "${DEPLOY_SKIP_WWW_RSYNC:-false}" = "true" ]; then
            ensure_dir "$api_host" "$DEPLOY_API_PATH" "publish"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/html" "publish html"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/html/images/profile" "profile uploads"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/html/images/profile-backgrounds" "profile background uploads"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/.aspnet" "aspnet keys"
          else
            ensure_dir "$www_host" "$DEPLOY_WWW_PATH" "www"
            ensure_dir "$api_host" "$DEPLOY_API_PATH" "api"
          fi

      - name: Deploy static web client (html)
        if: env.DEPLOY_SKIP_WWW_RSYNC != 'true'
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_WWW_HOST:-$DEPLOY_HOST}"
          target="${DEPLOY_USER}@${host}:${DEPLOY_WWW_PATH}/"
          www_rsync_args=(
            -avz
            --delete
            --filter 'P appsettings.json'
            --filter 'P appsettings.Development.json'
          )
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${www_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Rava.Api/html/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${www_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Rava.Api/html/ \
              "$target"
          fi

      - name: Deploy game html to publish/html
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          target="${remote}:${DEPLOY_API_PATH}/html/"
          html_rsync_args=(
            -avz
            --filter 'P images/profile/'
            --filter 'P images/profile/***'
            --filter 'P images/profile-backgrounds/'
            --filter 'P images/profile-backgrounds/***'
            --filter 'P exonet/offworld-news/editions/'
            --filter 'P exonet/offworld-news/editions/***'
            --filter 'P exonet/offworld-news/images/'
            --filter 'P exonet/offworld-news/images/***'
            --exclude 'uploads/'
            --exclude 'images/profile/'
            --exclude 'images/profile-backgrounds/'
            --exclude 'exonet/offworld-news/editions/'
            --exclude 'exonet/offworld-news/images/'
          )
          echo "Deploying game html from checkout to ${target}"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${html_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Rava.Api/html/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${html_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Rava.Api/html/ \
              "$target"
          fi

      - name: Deploy API publish output
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          target="${DEPLOY_USER}@${host}:${DEPLOY_API_PATH}/"
          # --exclude skips transfer; --filter P* prevents --delete from removing server-only files.
          api_rsync_args=(
            -avz
            --delete
            --filter 'P appsettings.json'
            --filter 'P appsettings.Development.json'
            --filter 'P server-runtime.json'
            --filter 'P status-runtime.json'
            --filter 'P credits.csv'
            --filter 'P market-items.csv'
            --filter 'P trade-items.csv'
            --filter 'P hate-speech-terms.csv'
            --filter 'P bad-language-terms.csv'
            --filter 'P political-terms.csv'
            --filter 'P sexual-terms.csv'
            --filter 'P html/images/profile/'
            --filter 'P html/images/profile/***'
            --filter 'P html/images/profile-backgrounds/'
            --filter 'P html/images/profile-backgrounds/***'
            --filter 'P exonet/offworld-news/editions/'
            --filter 'P exonet/offworld-news/editions/***'
            --filter 'P exonet/offworld-news/images/'
            --filter 'P exonet/offworld-news/images/***'
            --filter 'P .aspnet/'
            --filter 'P .aspnet/***'
            --exclude 'appsettings.json'
            --exclude 'appsettings.Development.json'
            --exclude 'html/images/profile/'
            --exclude 'html/images/profile-backgrounds/'
            --exclude 'exonet/offworld-news/editions/'
            --exclude 'exonet/offworld-news/images/'
            --exclude 'server-runtime.json'
            --exclude 'status-runtime.json'
          )
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${api_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              publish/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${api_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              publish/ \
              "$target"
          fi

      - name: Restart services
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            sudo_prefix=""
          else
            sudo_prefix="sudo "
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          restart_unit() {
            local unit="$1"
            if [ -z "$unit" ]; then
              return 0
            fi
            if ! run_remote "${sudo_prefix}systemctl cat ${unit}.service >/dev/null 2>&1"; then
              echo "WARNING: ${unit}.service is not installed on the server; skipping restart."
              echo "Run sudo install-rava-systemd on the server (see docs/deploy.md)."
              return 0
            fi
            if run_remote "${sudo_prefix}systemctl restart ${unit}"; then
              echo "Restarted ${unit}"
            else
              echo "WARNING: systemctl restart ${unit} failed (deploy files were still synced)." >&2
            fi
          }

          if run_remote "command -v restart-rava >/dev/null 2>&1"; then
            if run_remote "${sudo_prefix}restart-rava"; then
              echo "Restarted services via restart-rava"
            else
              echo "WARNING: restart-rava failed; trying individual service restarts." >&2
              restart_unit "${DEPLOY_API_SERVICE}"
              restart_unit "${DEPLOY_STATUS_SERVICE}"
              restart_unit "${DEPLOY_ADMIN_SERVICE}"
              restart_unit "${DEPLOY_MODERATOR_SERVICE}"
              restart_unit "${DEPLOY_DOCS_SERVICE}"
            fi
          else
            echo "WARNING: restart-rava not found; falling back to systemctl restart." >&2
            restart_unit "${DEPLOY_API_SERVICE}"
            restart_unit "${DEPLOY_STATUS_SERVICE}"
            restart_unit "${DEPLOY_ADMIN_SERVICE}"
            restart_unit "${DEPLOY_MODERATOR_SERVICE}"
            restart_unit "${DEPLOY_DOCS_SERVICE}"
          fi

      - name: Install helper scripts
        continue-on-error: true
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            sudo_prefix=""
          else
            sudo_prefix="sudo "
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          staging="/tmp/rava-scripts-install"
          echo "Syncing scripts/ to ${remote}:${staging}"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync -az --delete scripts/ \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${remote}:${staging}/"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync -az --delete scripts/ \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${remote}:${staging}/"
          fi

          run_remote "${sudo_prefix}bash ${staging}/install-bin-scripts.sh ${staging}"
          echo "Installed /usr/local/bin/restart-rava and related helpers."
