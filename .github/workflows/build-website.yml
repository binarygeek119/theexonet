name: theexonet CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "scripts/**"
      - ".github/workflows/build-website.yml"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/branch-protection.md"
      - ".github/rulesets/**"
      - "docs/game/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "scripts/**"
      - ".github/workflows/build-website.yml"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/branch-protection.md"
      - ".github/rulesets/**"
      - "docs/game/**"
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: Build and release only (skip production deploy)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
      release_date: ${{ steps.meta.outputs.date }}
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set release tag
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="website-${DATE}-${{ github.run_number }}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Theexonet.slnx

      - name: Build
        run: dotnet build Theexonet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Theexonet.slnx --configuration Release --no-build --verbosity normal

      - name: Validate web JavaScript
        run: |
          node --check Theexonet.Api/html/js/api.js
          node --check Theexonet.Api/html/js/app.js
          node --check Theexonet.Api/html/js/exonet.js
          node --check Theexonet.Api/html/js/admin.js
          node --check Theexonet.Api/html/js/moderator.js
          node --check Theexonet.Api/html/js/currency.js
          node --check Theexonet.Status/wwwroot/js/status.js
          node --check Theexonet.Status/wwwroot/js/values.js
          node --check Theexonet.Status/wwwroot/js/ai.js
          node --check Theexonet.Status/wwwroot/js/openai.js
          node --check Theexonet.Status/wwwroot/js/ai-content.js

      - name: Publish web app
        run: bash ../scripts/test-publish-bundle.sh

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: theexonet-website
          path: |
            server/publish/
            server/data/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: theexonet-website
          path: .

      - name: Create release archive
        run: zip -r "theexonet-website-${{ needs.build.outputs.release_tag }}.zip" publish data

      - name: Prepare release body
        id: release_body
        env:
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
        run: |
          chmod +x scripts/generate-release-notes.sh
          VERSION_FILE=server/Theexonet.Core/Constants/GameVersion.cs
          MAJOR="$(sed -n 's/.*Major = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          MINOR="$(sed -n 's/.*Minor = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          PATCH="$(sed -n 's/.*Patch = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          GAME_VERSION="V${MAJOR}.${MINOR}.${PATCH}"
          echo "game_version=${GAME_VERSION}" >> "$GITHUB_OUTPUT"

          {
            echo "## What's changed"
            echo
            bash scripts/generate-release-notes.sh
            echo
            echo "## Release info"
            echo
            echo "- **Game version:** ${GAME_VERSION}"
            echo "- **Tag:** \`${RELEASE_TAG}\`"
            echo "- **Date (UTC):** ${RELEASE_DATE}"
            echo "- **Build number:** ${{ github.run_number }}"
            echo "- **Commit:** ${{ github.sha }}"
            echo "- **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "## Install"
            echo
            echo "Download \`theexonet-website-*.zip\`, extract \`publish/\`, copy \`appsettings.json.example\` to \`appsettings.json\`, configure secrets, then run:"
            echo
            echo "- **\`Theexonet.Api.dll\`** â€” port 5000"
            echo "- **\`Theexonet.Status.dll\`** â€” port 6000 (same folder; add \`StatusMonitor\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Admin.dll\`** â€” port 7000 (same folder; add \`AdminPortal\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Moderator.dll\`** â€” port 7050 (same folder; add \`ModeratorPortal\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Docs.dll\`** â€” port 9000 (same folder; add \`DocsPortal\` section to \`appsettings.json\`)"
          } > release-body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Website ${{ needs.build.outputs.release_tag }} (${{ steps.release_body.outputs.game_version }})
          body_path: release-body.md
          files: theexonet-website-*.zip


  deploy:
    name: Deploy to production (FTPS)
    needs: build
    if: >
      github.event_name != 'pull_request' &&
      vars.ENABLE_PRODUCTION_DEPLOY == 'true' &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_deploy)
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST || 'theexonet.com' }}
      DEPLOY_FTP_HOST: ${{ vars.DEPLOY_FTP_HOST || secrets.DEPLOY_FTP_HOST || '' }}
      DEPLOY_FTP_USER: ${{ vars.DEPLOY_FTP_USER || secrets.DEPLOY_FTP_USER || 'gameftp' }}
      DEPLOY_FTP_PORT: ${{ vars.DEPLOY_FTP_PORT || secrets.DEPLOY_FTP_PORT || '21' }}
      DEPLOY_FTP_STAGING_DIR: ${{ vars.DEPLOY_FTP_STAGING_DIR || secrets.DEPLOY_FTP_STAGING_DIR || 'staging' }}
      DEPLOY_SSH_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER || 'root' }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || secrets.DEPLOY_SSH_PORT || '22' }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: theexonet-website
          path: .

      - name: Ensure html is in publish bundle
        run: rsync -a server/Theexonet.Api/html/ publish/html/

      - name: Validate FTPS deploy credentials
        env:
          DEPLOY_FTP_PASSWORD: ${{ secrets.DEPLOY_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_FTP_PASSWORD}" ]; then
            echo "Add repository secret DEPLOY_FTP_PASSWORD (gameftp password)." >&2
            echo "On the server install the staging watcher: sudo bash scripts/install-staging-watcher.sh" >&2
            exit 1
          fi

      - name: Normalize deploy host
        run: |
          set -euo pipefail
          host="${DEPLOY_FTP_HOST:-$DEPLOY_HOST}"
          host="${host#https://}"
          host="${host#http://}"
          host="${host%%/*}"
          host="${host%%:*}"
          host="$(printf '%s' "$host" | tr -d '[:space:]')"
          if [ -z "$host" ]; then
            echo "Set DEPLOY_HOST or DEPLOY_FTP_HOST (e.g. theexonet.com)." >&2
            exit 1
          fi
          echo "DEPLOY_FTP_HOST=$host" >> "$GITHUB_ENV"
          deploy_ip="$(getent ahostsv4 "$host" 2>/dev/null | awk 'NR==1 {print $1}' || true)"
          echo "FTPS target: ${host}${deploy_ip:+ (A ${deploy_ip})} -> ${DEPLOY_FTP_STAGING_DIR}/"

      - name: Install lftp and sshpass
        run: sudo apt-get update && sudo apt-get install -y lftp sshpass

      - name: Create deploy archive
        run: zip -r "theexonet-website-deploy-${GITHUB_SHA}.zip" publish data

      - name: Upload deploy bundle via FTPS
        env:
          DEPLOY_FTP_PASSWORD: ${{ secrets.DEPLOY_FTP_PASSWORD }}
        run: |
          set -euo pipefail
          chmod +x scripts/github-deploy-ftp.sh
          bash scripts/github-deploy-ftp.sh "theexonet-website-deploy-${GITHUB_SHA}.zip"
          echo "Uploaded deploy zip to staging."

      - name: Promote and restart via SSH
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_SSH_HOST: ${{ env.DEPLOY_FTP_HOST }}
        run: |
          set -euo pipefail
          chmod +x scripts/github-deploy-restart.sh
          bash scripts/github-deploy-restart.sh

      - name: Wait for production HTTP
        run: |
          set -euo pipefail
          host="${DEPLOY_FTP_HOST}"
          wait_http() {
            local label="$1"
            local url="$2"
            local attempt=1
            while [ "$attempt" -le 24 ]; do
              if curl -sf --max-time 20 "$url" >/dev/null; then
                echo "${label}: OK (${url})"
                return 0
              fi
              echo "${label}: waiting (attempt ${attempt}/24)..."
              sleep 10
              attempt=$((attempt + 1))
            done
            echo "ERROR: ${label} not reachable at ${url}" >&2
            echo "Ensure theexonet-staging-watcher.service is running on the server." >&2
            return 1
          }
          wait_http "Game" "http://${host}/"
          wait_http "API status" "http://api.${host}/api/status" || \
            wait_http "API root" "http://api.${host}/"
