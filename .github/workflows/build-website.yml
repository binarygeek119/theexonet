name: Build website

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
      release_date: ${{ steps.meta.outputs.date }}
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release tag
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="website-${DATE}-${{ github.run_number }}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Rava.slnx

      - name: Build
        run: dotnet build Rava.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Rava.slnx --configuration Release --no-build --verbosity normal

      - name: Publish web app
        run: |
          dotnet publish Rava.Api/Rava.Api.csproj --configuration Release --output ./publish
          rsync -a Rava.Api/html/ publish/html/
          dotnet publish Rava.Status/Rava.Status.csproj --configuration Release --output ./publish-status

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: rava-website
          path: |
            server/publish/
            server/publish-status/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: rava-website
          path: release-bundle

      - name: Create release archive
        run: zip -r "rava-website-${{ needs.build.outputs.release_tag }}.zip" release-bundle/publish release-bundle/publish-status

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Website ${{ needs.build.outputs.release_tag }}
          body: |
            Automated website release.

            - **Tag:** `${{ needs.build.outputs.release_tag }}`
            - **Date (UTC):** ${{ needs.build.outputs.release_date }}
            - **Build number:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download `rava-website-*.zip` and extract:

            - **`publish/`** — `Rava.Api` (port 5000). Copy `appsettings.json.example` to `appsettings.json`, configure secrets, then run.
            - **`publish-status/`** — `Rava.Status` dashboard (port 6000). Edit `appsettings.json` (`StatusMonitor:ApiBaseUrl` → `http://127.0.0.1:5000` on the API host).
          files: rava-website-*.zip
          generate_release_notes: true

  deploy:
    name: Deploy to production
    needs: build
    if: github.event_name != 'pull_request' && vars.ENABLE_PRODUCTION_DEPLOY == 'true'
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download API publish artifact
        uses: actions/download-artifact@v4
        with:
          name: rava-website
          path: release-bundle

      - name: Ensure html is in publish bundle
        run: rsync -a server/Rava.Api/html/ release-bundle/publish/html/

      - name: Setup SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add SSH host keys
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_WWW_HOST: ${{ secrets.DEPLOY_WWW_HOST }}
          DEPLOY_API_HOST: ${{ secrets.DEPLOY_API_HOST }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          port="${DEPLOY_SSH_PORT:-22}"
          for host in "$DEPLOY_HOST" "$DEPLOY_WWW_HOST" "$DEPLOY_API_HOST"; do
            if [ -n "$host" ]; then
              ssh-keyscan -H -p "$port" "$host" >> ~/.ssh/known_hosts
            fi
          done

      - name: Deploy static web client (html)
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_WWW_HOST: ${{ secrets.DEPLOY_WWW_HOST }}
          DEPLOY_WWW_PATH: ${{ secrets.DEPLOY_WWW_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          host="${DEPLOY_WWW_HOST:-$DEPLOY_HOST}"
          port="${DEPLOY_SSH_PORT:-22}"
          rsync -avz --delete \
            -e "ssh -p ${port} -o StrictHostKeyChecking=yes" \
            server/Rava.Api/html/ \
            "${DEPLOY_USER}@${host}:${DEPLOY_WWW_PATH}/"

      - name: Deploy API publish output
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_API_HOST: ${{ secrets.DEPLOY_API_HOST }}
          DEPLOY_API_PATH: ${{ secrets.DEPLOY_API_PATH }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          port="${DEPLOY_SSH_PORT:-22}"
          rsync -avz --delete \
            -e "ssh -p ${port} -o StrictHostKeyChecking=yes" \
            --exclude 'appsettings.json' \
            --exclude 'appsettings.Development.json' \
            --exclude 'html/uploads/profiles/*' \
            release-bundle/publish/ \
            "${DEPLOY_USER}@${host}:${DEPLOY_API_PATH}/"

      - name: Restart API service
        env:
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_API_HOST: ${{ secrets.DEPLOY_API_HOST }}
          DEPLOY_API_SERVICE: ${{ secrets.DEPLOY_API_SERVICE }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_API_SERVICE}" ]; then
            echo "DEPLOY_API_SERVICE not set; skipping restart."
            exit 0
          fi
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          port="${DEPLOY_SSH_PORT:-22}"
          ssh -p "$port" -o StrictHostKeyChecking=yes \
            "${DEPLOY_USER}@${host}" \
            "sudo systemctl restart ${DEPLOY_API_SERVICE}"

