name: theexonet CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "scripts/**"
      - ".github/workflows/build-website.yml"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/branch-protection.md"
      - ".github/rulesets/**"
      - "docs/game/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "scripts/**"
      - ".github/workflows/build-website.yml"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/branch-protection.md"
      - ".github/rulesets/**"
      - "docs/game/**"
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: Build and release only (skip production deploy)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
      release_date: ${{ steps.meta.outputs.date }}
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            server
            scripts
            docs/game
          lfs: false

      - name: Set release tag
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="website-${DATE}-${{ github.run_number }}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Theexonet.slnx

      - name: Build
        run: dotnet build Theexonet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Theexonet.slnx --configuration Release --no-build --verbosity normal

      - name: Validate web JavaScript
        run: |
          node --check Theexonet.Api/html/js/api.js
          node --check Theexonet.Api/html/js/app.js
          node --check Theexonet.Api/html/js/exonet.js
          node --check Theexonet.Api/html/js/admin.js
          node --check Theexonet.Api/html/js/moderator.js
          node --check Theexonet.Api/html/js/currency.js
          node --check Theexonet.Status/wwwroot/js/status.js
          node --check Theexonet.Status/wwwroot/js/values.js
          node --check Theexonet.Status/wwwroot/js/ai.js
          node --check Theexonet.Status/wwwroot/js/openai.js
          node --check Theexonet.Status/wwwroot/js/ai-content.js

      - name: Publish web app
        run: bash ../scripts/test-publish-bundle.sh

      - name: Stage publish artifact
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/publish" "${GITHUB_WORKSPACE}/data"
          rsync -a publish/ "${GITHUB_WORKSPACE}/publish/"
          rsync -a data/ "${GITHUB_WORKSPACE}/data/"
          test -f "${GITHUB_WORKSPACE}/publish/Theexonet.Api.dll"

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: theexonet-website
          path: |
            publish/
            data/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout release metadata
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          sparse-checkout: |
            scripts
            server/Theexonet.Core
          lfs: false

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: theexonet-website
          path: .

      - name: Verify release bundle
        run: test -f publish/Theexonet.Api.dll

      - name: Create release archive
        run: zip -r "theexonet-website-${{ needs.build.outputs.release_tag }}.zip" publish data

      - name: Prepare release body
        id: release_body
        env:
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
        run: |
          chmod +x scripts/generate-release-notes.sh
          VERSION_FILE=server/Theexonet.Core/Constants/GameVersion.cs
          MAJOR="$(sed -n 's/.*Major = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          MINOR="$(sed -n 's/.*Minor = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          PATCH="$(sed -n 's/.*Patch = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          GAME_VERSION="V${MAJOR}.${MINOR}.${PATCH}"
          echo "game_version=${GAME_VERSION}" >> "$GITHUB_OUTPUT"

          {
            echo "## What's changed"
            echo
            bash scripts/generate-release-notes.sh
            echo
            echo "## Release info"
            echo
            echo "- **Game version:** ${GAME_VERSION}"
            echo "- **Tag:** \`${RELEASE_TAG}\`"
            echo "- **Date (UTC):** ${RELEASE_DATE}"
            echo "- **Build number:** ${{ github.run_number }}"
            echo "- **Commit:** ${{ github.sha }}"
            echo "- **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "## Install"
            echo
            echo "Download \`theexonet-website-*.zip\`, extract \`publish/\`, copy \`appsettings.json.example\` to \`appsettings.json\`, configure secrets, then run:"
            echo
            echo "- **\`Theexonet.Api.dll\`** â€” port 5000"
            echo "- **\`Theexonet.Status.dll\`** â€” port 6000 (same folder; add \`StatusMonitor\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Admin.dll\`** â€” port 7000 (same folder; add \`AdminPortal\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Moderator.dll\`** â€” port 7050 (same folder; add \`ModeratorPortal\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Docs.dll\`** â€” port 9000 (same folder; add \`DocsPortal\` section to \`appsettings.json\`)"
          } > release-body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Website ${{ needs.build.outputs.release_tag }} (${{ steps.release_body.outputs.game_version }})
          body_path: release-body.md
          files: theexonet-website-*.zip


  deploy:
    name: Deploy to production (SSH)
    needs: build
    if: >
      github.event_name != 'pull_request' &&
      vars.ENABLE_PRODUCTION_DEPLOY == 'true' &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_deploy)
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST || 'theexonet.com' }}
      DEPLOY_FTP_HOST: ${{ vars.DEPLOY_FTP_HOST || secrets.DEPLOY_FTP_HOST || '' }}
      DEPLOY_FTP_USER: ${{ vars.DEPLOY_FTP_USER || secrets.DEPLOY_FTP_USER || 'gameftp' }}
      DEPLOY_FTP_PORT: ${{ vars.DEPLOY_FTP_PORT || secrets.DEPLOY_FTP_PORT || '21' }}
      DEPLOY_FTP_STAGING_DIR: ${{ vars.DEPLOY_FTP_STAGING_DIR || secrets.DEPLOY_FTP_STAGING_DIR || 'staging' }}
      DEPLOY_SSH_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER || 'githubdeploy' }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || secrets.DEPLOY_SSH_PORT || '22' }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout deploy scripts
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts
          lfs: false

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: theexonet-website
          path: .

      - name: Prepare deploy bundle
        run: |
          set -euo pipefail
          if [ ! -f publish/Theexonet.Api.dll ]; then
            echo "ERROR: publish/Theexonet.Api.dll missing after artifact download." >&2
            find . -name 'Theexonet.Api.dll' >&2 || true
            exit 1
          fi
          if [ ! -f publish/html/index.html ]; then
            echo "ERROR: publish/html/index.html missing from build artifact." >&2
            exit 1
          fi
          test -f publish/Theexonet.Api.dll
          grep -q 'theexonet-html-build' publish/html/index.html
          marker="$(grep -o 'name="theexonet-html-build" content="[^"]*"' publish/html/index.html \
            | sed 's/.*content="\([^"]*\)".*/\1/')"
          if [ -z "${marker}" ]; then
            echo "ERROR: could not read theexonet-html-build from publish/html/index.html." >&2
            exit 1
          fi
          echo "HTML_BUILD_MARKER=${marker}" >> "$GITHUB_ENV"
          echo "Deploy html build marker: ${marker}"
          grep -qF "content=\"${marker}\"" publish/html/index.html

      - name: Validate SSH deploy credentials
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_SSH_PASSWORD}" ]; then
            echo "Add repository secret DEPLOY_SSH_PASSWORD (githubdeploy password)." >&2
            echo "On the server: sudo DEPLOY_SSH_PASSWORD='...' bash scripts/theexonet/setup-github-ssh-restart.sh" >&2
            exit 1
          fi
          case "${DEPLOY_HOST}" in
            *duckdns.org*)
              echo "WARN: DEPLOY_HOST is still ${DEPLOY_HOST}. Set DEPLOY_HOST to theexonet.com or the VM IP." >&2
              ;;
          esac
          echo "SSH deploy user: ${DEPLOY_SSH_USER} (expect githubdeploy)"
          if [ "${DEPLOY_SSH_USER}" != "githubdeploy" ]; then
            echo "WARN: Set GitHub variable DEPLOY_USER=githubdeploy" >&2
          fi

      - name: Normalize deploy host
        run: |
          set -euo pipefail
          host="${DEPLOY_FTP_HOST:-$DEPLOY_HOST}"
          host="${host#https://}"
          host="${host#http://}"
          host="${host%%/*}"
          host="${host%%:*}"
          host="$(printf '%s' "$host" | tr -d '[:space:]')"
          if [ -z "$host" ]; then
            echo "Set DEPLOY_HOST or DEPLOY_FTP_HOST (e.g. theexonet.com)." >&2
            exit 1
          fi
          echo "DEPLOY_FTP_HOST=$host" >> "$GITHUB_ENV"
          deploy_ip="$(getent ahostsv4 "$host" 2>/dev/null | awk 'NR==1 {print $1}' || true)"
          echo "DEPLOY_SSH_HOST=$host" >> "$GITHUB_ENV"
          echo "SSH target: ${host}${deploy_ip:+ (A ${deploy_ip})} -> /var/www/staging/"

      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass openssh-client

      - name: Create deploy archive
        run: |
          set -euo pipefail
          # Runtime-generated ONN assets live under /var/www/data — never bundle them.
          find publish/html -type l -delete 2>/dev/null || true
          rm -rf \
            publish/html/exonet/offworld-news/reporters \
            publish/html/exonet/offworld-news/editions \
            publish/html/exonet/offworld-news/images
          tar -czf "theexonet-website-deploy-${GITHUB_SHA}.tar.gz" publish data

      - name: Upload and deploy via SSH
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
          DEPLOY_SSH_HOST: ${{ env.DEPLOY_SSH_HOST }}
          HTML_BUILD_MARKER: ${{ env.HTML_BUILD_MARKER }}
        run: |
          set -euo pipefail
          chmod +x scripts/github-deploy-ssh.sh
          bash scripts/github-deploy-ssh.sh "theexonet-website-deploy-${GITHUB_SHA}.tar.gz"

      - name: Wait for production HTTP
        env:
          HTML_BUILD_MARKER: ${{ env.HTML_BUILD_MARKER }}
        run: |
          set -euo pipefail
          host="${DEPLOY_FTP_HOST}"
          marker="${HTML_BUILD_MARKER:?HTML_BUILD_MARKER missing — rerun Prepare deploy bundle}"
          wait_http() {
            local label="$1"
            local url="$2"
            local attempt=1
            while [ "$attempt" -le 24 ]; do
              if curl -sf --max-time 20 "$url" >/dev/null; then
                echo "${label}: OK (${url})"
                return 0
              fi
              echo "${label}: waiting (attempt ${attempt}/24)..."
              sleep 10
              attempt=$((attempt + 1))
            done
            echo "ERROR: ${label} not reachable at ${url}" >&2
            echo "Ensure theexonet-staging-watcher.service is running on the server." >&2
            return 1
          }
          verify_game_html() {
            local url="$1"
            local html
            html="$(curl -sf --max-time 20 \
              -H 'Cache-Control: no-cache' \
              -H 'Pragma: no-cache' \
              "${url}" 2>/dev/null || true)"
            if [ -z "${html}" ]; then
              return 1
            fi
            grep -qF "content=\"${marker}\"" <<< "${html}"
          }
          wait_http "Game" "http://${host}/"
          wait_http "API status" "http://api.${host}/api/status" || \
            wait_http "API root" "http://api.${host}/"
          marker_ok=0
          for attempt in $(seq 1 24); do
            if verify_game_html "http://${host}/index.html?ci=${GITHUB_SHA}" \
              || verify_game_html "https://${host}/index.html?ci=${GITHUB_SHA}" \
              || verify_game_html "http://${host}/?ci=${GITHUB_SHA}"; then
              marker_ok=1
              break
            fi
            echo "Game html build marker: waiting (attempt ${attempt}/24)..."
            sleep 10
          done
          if [ "${marker_ok}" -ne 1 ]; then
            echo "ERROR: production still serves stale html (missing build marker ${marker})." >&2
            echo "On the VM: sudo grep theexonet-html-build /var/www/publish/html/index.html" >&2
            echo "If disk is correct: sudo deploy-theexonet-html /var/www/staging/publish/html" >&2
            exit 1
          fi
          echo "Game html build marker: OK (${marker})"
