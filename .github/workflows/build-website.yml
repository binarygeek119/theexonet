name: Build website

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Rava.slnx

      - name: Build
        run: dotnet build Rava.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Rava.slnx --configuration Release --no-build --verbosity normal

      - name: Publish web app
        run: dotnet publish Rava.Api/Rava.Api.csproj --configuration Release --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: rava-website
          path: server/publish/
          if-no-files-found: error
