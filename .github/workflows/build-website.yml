name: theexonet CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - "scripts/**"
      - ".github/workflows/build-website.yml"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/branch-protection.md"
      - ".github/rulesets/**"
      - "docs/game/**"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - "scripts/**"
      - ".github/workflows/build-website.yml"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
      - "docs/deploy.md"
      - "docs/github-deploy-setup.md"
      - "docs/branch-protection.md"
      - ".github/rulesets/**"
      - "docs/game/**"
  workflow_dispatch:
    inputs:
      skip_deploy:
        description: Build and release only (skip production deploy)
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
      release_date: ${{ steps.meta.outputs.date }}
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set release tag
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="website-${DATE}-${{ github.run_number }}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Theexonet.slnx

      - name: Build
        run: dotnet build Theexonet.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Theexonet.slnx --configuration Release --no-build --verbosity normal

      - name: Validate web JavaScript
        run: |
          node --check Theexonet.Api/html/js/api.js
          node --check Theexonet.Api/html/js/app.js
          node --check Theexonet.Api/html/js/exonet.js
          node --check Theexonet.Api/html/js/admin.js
          node --check Theexonet.Api/html/js/moderator.js
          node --check Theexonet.Api/html/js/currency.js
          node --check Theexonet.Status/wwwroot/js/status.js
          node --check Theexonet.Status/wwwroot/js/values.js
          node --check Theexonet.Status/wwwroot/js/ai.js
          node --check Theexonet.Status/wwwroot/js/openai.js
          node --check Theexonet.Status/wwwroot/js/ai-content.js

      - name: Publish web app
        run: bash ../scripts/test-publish-bundle.sh

      - name: Upload publish artifact
        uses: actions/upload-artifact@v7
        with:
          name: theexonet-website
          path: |
            server/publish/
            server/data/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: theexonet-website
          path: .

      - name: Create release archive
        run: zip -r "theexonet-website-${{ needs.build.outputs.release_tag }}.zip" publish data

      - name: Prepare release body
        id: release_body
        env:
          RELEASE_TAG: ${{ needs.build.outputs.release_tag }}
          RELEASE_DATE: ${{ needs.build.outputs.release_date }}
        run: |
          chmod +x scripts/generate-release-notes.sh
          VERSION_FILE=server/Theexonet.Core/Constants/GameVersion.cs
          MAJOR="$(sed -n 's/.*Major = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          MINOR="$(sed -n 's/.*Minor = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          PATCH="$(sed -n 's/.*Patch = \([0-9][0-9]*\).*/\1/p' "$VERSION_FILE")"
          GAME_VERSION="V${MAJOR}.${MINOR}.${PATCH}"
          echo "game_version=${GAME_VERSION}" >> "$GITHUB_OUTPUT"

          {
            echo "## What's changed"
            echo
            bash scripts/generate-release-notes.sh
            echo
            echo "## Release info"
            echo
            echo "- **Game version:** ${GAME_VERSION}"
            echo "- **Tag:** \`${RELEASE_TAG}\`"
            echo "- **Date (UTC):** ${RELEASE_DATE}"
            echo "- **Build number:** ${{ github.run_number }}"
            echo "- **Commit:** ${{ github.sha }}"
            echo "- **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            echo
            echo "## Install"
            echo
            echo "Download \`theexonet-website-*.zip\`, extract \`publish/\`, copy \`appsettings.json.example\` to \`appsettings.json\`, configure secrets, then run:"
            echo
            echo "- **\`Theexonet.Api.dll\`** — port 5000"
            echo "- **\`Theexonet.Status.dll\`** — port 6000 (same folder; add \`StatusMonitor\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Admin.dll\`** — port 7000 (same folder; add \`AdminPortal\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Moderator.dll\`** — port 7050 (same folder; add \`ModeratorPortal\` section to \`appsettings.json\`)"
            echo "- **\`Theexonet.Docs.dll\`** — port 9000 (same folder; add \`DocsPortal\` section to \`appsettings.json\`)"
          } > release-body.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Website ${{ needs.build.outputs.release_tag }} (${{ steps.release_body.outputs.game_version }})
          body_path: release-body.md
          files: theexonet-website-*.zip

  deploy:
    name: Deploy to production
    needs: build
    if: >
      github.event_name != 'pull_request' &&
      vars.ENABLE_PRODUCTION_DEPLOY == 'true' &&
      (github.event_name != 'workflow_dispatch' || !inputs.skip_deploy)
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST || 'binarygeek119.duckdns.org' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER || 'root' }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_WWW_PATH: ${{ vars.DEPLOY_WWW_PATH || secrets.DEPLOY_WWW_PATH || '/var/www/publish' }}
      DEPLOY_API_PATH: ${{ vars.DEPLOY_API_PATH || secrets.DEPLOY_API_PATH || '/var/www/publish' }}
      DEPLOY_WWW_HOST: ${{ vars.DEPLOY_WWW_HOST || secrets.DEPLOY_WWW_HOST || '' }}
      DEPLOY_API_HOST: ${{ vars.DEPLOY_API_HOST || secrets.DEPLOY_API_HOST || '' }}
      DEPLOY_API_SERVICE: ${{ vars.DEPLOY_API_SERVICE || secrets.DEPLOY_API_SERVICE || 'theexonet-api' }}
      DEPLOY_STATUS_SERVICE: ${{ vars.DEPLOY_STATUS_SERVICE || secrets.DEPLOY_STATUS_SERVICE || 'theexonet-status' }}
      DEPLOY_ADMIN_SERVICE: ${{ vars.DEPLOY_ADMIN_SERVICE || secrets.DEPLOY_ADMIN_SERVICE || 'theexonet-admin' }}
      DEPLOY_MODERATOR_SERVICE: ${{ vars.DEPLOY_MODERATOR_SERVICE || secrets.DEPLOY_MODERATOR_SERVICE || 'theexonet-moderator' }}
      DEPLOY_DOCS_SERVICE: ${{ vars.DEPLOY_DOCS_SERVICE || secrets.DEPLOY_DOCS_SERVICE || 'theexonet-docs' }}
      DEPLOY_REPO_PATH: ${{ vars.DEPLOY_REPO_PATH || secrets.DEPLOY_REPO_PATH || '/opt/theexonet/theexonet' }}
      DEPLOY_DATA_PATH: ${{ vars.DEPLOY_DATA_PATH || secrets.DEPLOY_DATA_PATH || '/var/www/data' }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      GITHUB_SHA: ${{ github.sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Download publish artifact
        uses: actions/download-artifact@v8
        with:
          name: theexonet-website
          path: .

      - name: Ensure html is in publish bundle
        run: rsync -a server/Theexonet.Api/html/ publish/html/

      - name: Detect deploy auth method
        id: auth
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "method=key" >> "$GITHUB_OUTPUT"
          elif [ -n "$DEPLOY_SSH_PASSWORD" ]; then
            echo "method=password" >> "$GITHUB_OUTPUT"
          else
            echo "Configure DEPLOY_SSH_KEY or DEPLOY_SSH_PASSWORD in repository secrets." >&2
            echo "See docs/github-deploy-setup.md" >&2
            exit 1
          fi

      - name: Setup SSH (key)
        if: steps.auth.outputs.method == 'key'
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup SSH (password)
        if: steps.auth.outputs.method == 'password'
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Normalize deploy settings
        run: |
          set -euo pipefail
          normalize_host() {
            local h="${1:-}"
            h="${h#https://}"
            h="${h#http://}"
            h="${h%%/*}"
            h="${h%%:*}"
            h="$(printf '%s' "$h" | tr -d '[:space:]')"
            printf '%s' "$h"
          }
          normalize_path() {
            local p="${1:-}"
            p="$(printf '%s' "$p" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            # Strip accidental rsync destination pasted into a path variable.
            if [[ "$p" =~ ^[^/@[:space:]]+@[^:]+:(/.+)$ ]]; then
              p="${BASH_REMATCH[1]}"
            elif [[ "$p" =~ ^[^/@[:space:]]+:(/.+)$ ]]; then
              p="${BASH_REMATCH[1]}"
            fi
            while [[ "$p" == */ ]] && [[ "$p" != "/" ]]; do
              p="${p%/}"
            done
            printf '%s' "$p"
          }
          validate_path() {
            local name="$1"
            local p="$2"
            if [ -z "$p" ]; then
              echo "ERROR: ${name} is empty. Use an absolute path, e.g. /var/www/publish." >&2
              exit 1
            fi
            if [[ "$p" != /* ]]; then
              echo "ERROR: ${name} must start with / (got '${p}'). Do not include user@host: — set DEPLOY_HOST and DEPLOY_USER separately." >&2
              exit 1
            fi
            if [[ "$p" == *@* ]] || [[ "$p" == *:* ]]; then
              echo "ERROR: ${name} must be a filesystem path only (got '${p}'). Use /var/www/publish, not user@host:/var/www/publish." >&2
              exit 1
            fi
            if [ "$p" = "/var/www" ]; then
              echo "ERROR: ${name} must not be /var/www alone — that drops html, wwwroot, and .aspnet beside publish." >&2
              echo "Use /var/www/publish for API + portals + game html (recommended)." >&2
              exit 1
            fi
            if [ "$p" = "/var/www/html" ] || [ "$p" = "/var/www/wwwroot" ]; then
              echo "ERROR: ${name} should be /var/www/publish, not a subfolder created by a bad deploy (${p})." >&2
              exit 1
            fi
          }

          host="$(normalize_host "$DEPLOY_HOST")"
          if [ -z "$host" ]; then
            echo "DEPLOY_HOST is empty. Set it to your server hostname (e.g. binarygeek119.duckdns.org)." >&2
            exit 1
          fi
          if ! [[ "$host" =~ ^[A-Za-z0-9]([A-Za-z0-9.-]*[A-Za-z0-9])?$ ]]; then
            echo "ERROR: DEPLOY_HOST '${host}' is not a valid hostname. Use hostname only — no https://, paths, or spaces." >&2
            exit 1
          fi
          echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"

          www_host="$(normalize_host "${DEPLOY_WWW_HOST:-}")"
          api_host="$(normalize_host "${DEPLOY_API_HOST:-}")"
          echo "DEPLOY_WWW_HOST=$www_host" >> "$GITHUB_ENV"
          echo "DEPLOY_API_HOST=$api_host" >> "$GITHUB_ENV"

          user="$(printf '%s' "$DEPLOY_USER" | tr -d '[:space:]')"
          if [ -z "$user" ]; then
            echo "DEPLOY_USER is empty." >&2
            exit 1
          fi
          echo "DEPLOY_USER=$user" >> "$GITHUB_ENV"

          port="$(printf '%s' "$DEPLOY_SSH_PORT" | tr -d '[:space:]')"
          if ! [[ "$port" =~ ^[0-9]+$ ]] || [ "$port" -lt 1 ] || [ "$port" -gt 65535 ]; then
            echo "ERROR: DEPLOY_SSH_PORT must be 1-65535, got '${port}'." >&2
            exit 1
          fi
          echo "DEPLOY_SSH_PORT=$port" >> "$GITHUB_ENV"

          www_path="$(normalize_path "$DEPLOY_WWW_PATH")"
          api_path="$(normalize_path "$DEPLOY_API_PATH")"
          validate_path "DEPLOY_WWW_PATH" "$www_path"
          validate_path "DEPLOY_API_PATH" "$api_path"
          echo "DEPLOY_WWW_PATH=$www_path" >> "$GITHUB_ENV"
          echo "DEPLOY_API_PATH=$api_path" >> "$GITHUB_ENV"

          repo_path="$(normalize_path "$DEPLOY_REPO_PATH")"
          validate_path "DEPLOY_REPO_PATH" "$repo_path"
          echo "DEPLOY_REPO_PATH=$repo_path" >> "$GITHUB_ENV"

          data_path="$(normalize_path "$DEPLOY_DATA_PATH")"
          validate_path "DEPLOY_DATA_PATH" "$data_path"
          echo "DEPLOY_DATA_PATH=$data_path" >> "$GITHUB_ENV"

          effective_www_host="${www_host:-$host}"
          effective_api_host="${api_host:-$host}"
          if [ "$effective_www_host" = "$effective_api_host" ] && { [ "$www_path" = "$api_path" ] || [ "$www_path" = "${api_path}/html" ]; }; then
            echo "DEPLOY_SKIP_WWW_RSYNC=true" >> "$GITHUB_ENV"
            echo "DEPLOY_WWW_PATH is under publish — game html ships in publish/html/ (skipping separate www rsync)."
          else
            echo "DEPLOY_SKIP_WWW_RSYNC=false" >> "$GITHUB_ENV"
          fi

          echo "Deploy targets:"
          if [ "${DEPLOY_SKIP_WWW_RSYNC:-false}" = "true" ]; then
            echo "  publish (api + html + portals): ${user}@${effective_api_host}:${api_path}/"
          else
            echo "  www: ${user}@${effective_www_host}:${www_path}/"
            echo "  api: ${user}@${effective_api_host}:${api_path}/"
          fi
          echo "  repo: ${repo_path}"

      - name: Add SSH host keys
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          unique_hosts=()
          for host in "$DEPLOY_HOST" "$DEPLOY_WWW_HOST" "$DEPLOY_API_HOST"; do
            host="${host#https://}"
            host="${host#http://}"
            host="${host%%/*}"
            host="${host%%:*}"
            host="$(printf '%s' "$host" | tr -d '[:space:]')"
            if [ -n "$host" ]; then
              duplicate=0
              for seen in "${unique_hosts[@]:-}"; do
                if [ "$seen" = "$host" ]; then
                  duplicate=1
                  break
                fi
              done
              if [ "$duplicate" -eq 0 ]; then
                unique_hosts+=("$host")
              fi
            fi
          done

          if [ "${#unique_hosts[@]}" -eq 0 ]; then
            echo "No deploy host configured. Set repository variable DEPLOY_HOST (hostname only, e.g. binarygeek119.duckdns.org)." >&2
            exit 1
          fi

          failed=0
          for host in "${unique_hosts[@]}"; do
            echo "Checking SSH reachability for ${host}:${DEPLOY_SSH_PORT}..."
            if ! getent ahosts "$host" >/dev/null; then
              echo "ERROR: DNS lookup failed for '${host}'. Check DEPLOY_HOST in GitHub Actions variables." >&2
              failed=1
              continue
            fi
            getent ahosts "$host" | head -n 3

            if ! timeout 15 bash -c "exec 3<>/dev/tcp/${host}/${DEPLOY_SSH_PORT}" 2>/dev/null; then
              echo "ERROR: Cannot open TCP ${host}:${DEPLOY_SSH_PORT} from GitHub Actions." >&2
              echo "On the server: ensure sshd listens on 0.0.0.0:${DEPLOY_SSH_PORT}, firewall allows inbound SSH, and router forwards port ${DEPLOY_SSH_PORT} if needed." >&2
              failed=1
              continue
            fi

            scan_err="$(mktemp)"
            if ! ssh-keyscan -T 15 -H -p "$DEPLOY_SSH_PORT" "$host" >> ~/.ssh/known_hosts 2>"$scan_err"; then
              echo "ERROR: ssh-keyscan failed for ${host}:${DEPLOY_SSH_PORT}." >&2
              sed 's/^/  /' "$scan_err" >&2
              failed=1
            else
              echo "Added host key for ${host}:${DEPLOY_SSH_PORT}"
            fi
            rm -f "$scan_err"
          done

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi

      - name: Ensure remote deploy directories exist
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ "$DEPLOY_USER" = "root" ]; then
            mkdir_cmd="mkdir -p"
          else
            mkdir_cmd="sudo mkdir -p"
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$1" "$2"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$1" "$2"
            fi
          }

          ensure_dir() {
            local host="$1"
            local path="$2"
            local label="$3"
            local remote="${DEPLOY_USER}@${host}"
            echo "Ensuring ${label} directory exists: ${path}"
            run_remote "$remote" "${mkdir_cmd} '${path}'"
          }

          www_host="${DEPLOY_WWW_HOST:-$DEPLOY_HOST}"
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          if [ "${DEPLOY_SKIP_WWW_RSYNC:-false}" = "true" ]; then
            ensure_dir "$api_host" "$DEPLOY_API_PATH" "publish"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/html" "publish html"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/wwwroot" "admin/moderator wwwroot"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/status-wwwroot" "status dashboard wwwroot"
            ensure_dir "$api_host" "$(dirname "${DEPLOY_REPO_PATH}")" "server git checkout parent"
            ensure_dir "$api_host" "${DEPLOY_API_PATH}/.aspnet" "aspnet keys"
          else
            ensure_dir "$www_host" "$DEPLOY_WWW_PATH" "www"
            ensure_dir "$api_host" "$DEPLOY_API_PATH" "api"
          fi

      - name: Deploy static web client (html)
        if: env.DEPLOY_SKIP_WWW_RSYNC != 'true'
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_WWW_HOST:-$DEPLOY_HOST}"
          target="${DEPLOY_USER}@${host}:${DEPLOY_WWW_PATH}/"
          www_rsync_args=(
            -avz
            --delete
            --filter 'P appsettings.json'
            --filter 'P appsettings.Development.json'
          )
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${www_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Theexonet.Api/html/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${www_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Theexonet.Api/html/ \
              "$target"
          fi

      - name: Deploy game html to publish/html
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          target="${remote}:${DEPLOY_API_PATH}/html/"
          html_rsync_args=(
            -avz
            --exclude 'uploads/'
            --exclude 'images/profile/'
            --exclude 'images/profile-backgrounds/'
            --exclude 'exonet/offworld-news/editions/'
            --exclude 'exonet/offworld-news/images/'
          )
          echo "Deploying game html from checkout to ${target}"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${html_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Theexonet.Api/html/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${html_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Theexonet.Api/html/ \
              "$target"
          fi

      - name: Deploy API publish output
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          target="${DEPLOY_USER}@${host}:${DEPLOY_API_PATH}/"
          # --exclude skips transfer; --filter P* prevents --delete from removing server-only files.
          api_rsync_args=(
            -avz
            --delete
            --filter 'P appsettings.json'
            --filter 'P appsettings.Development.json'
            --filter 'P server-runtime.json'
            --filter 'P status-runtime.json'
            --filter 'P .aspnet/'
            --filter 'P .aspnet/***'
            --exclude 'appsettings.json'
            --exclude 'appsettings.Development.json'
            --exclude 'server-runtime.json'
            --exclude 'status-runtime.json'
          )
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${api_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              publish/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${api_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              publish/ \
              "$target"
          fi

      - name: Deploy data CSV spreadsheets
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          data_target="${remote}:${DEPLOY_DATA_PATH}/"
          csv_files=(
            credits.csv
            market-items.csv
            trade-items.csv
            hate-speech-terms.csv
            bad-language-terms.csv
            political-terms.csv
            sexual-terms.csv
            offworld-news-reporters.csv
          )

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          for file in "${csv_files[@]}"; do
            if [ ! -f "data/${file}" ]; then
              echo "ERROR: missing deploy CSV artifact data/${file}" >&2
              exit 1
            fi
          done

          if [ "$DEPLOY_USER" = "root" ]; then
            mkdir_cmd="mkdir -p '${DEPLOY_DATA_PATH}'"
            chown_cmd="chown theexonet:theexonet '${DEPLOY_DATA_PATH}'/*.csv"
          else
            mkdir_cmd="sudo mkdir -p '${DEPLOY_DATA_PATH}'"
            chown_cmd="sudo chown theexonet:theexonet '${DEPLOY_DATA_PATH}'/*.csv"
          fi

          echo "Deploying CSV spreadsheets to ${data_target}"
          run_remote "$mkdir_cmd"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync -avz \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${csv_files[@]/#/data/}" \
              "$data_target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync -avz \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${csv_files[@]/#/data/}" \
              "$data_target"
          fi
          run_remote "$chown_cmd" || true

          for file in "${csv_files[@]}"; do
            if ! run_remote "test -f '${DEPLOY_DATA_PATH}/${file}'"; then
              echo "ERROR: CSV missing on server after deploy: ${DEPLOY_DATA_PATH}/${file}" >&2
              exit 1
            fi
          done
          echo "Data CSV spreadsheets updated in ${DEPLOY_DATA_PATH}"

      - name: Deploy merged status and portal wwwroot to host
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          www_target="${remote}:${DEPLOY_API_PATH}/wwwroot/"
          status_target="${remote}:${DEPLOY_API_PATH}/status-wwwroot/"
          staging="$(mktemp -d)"
          mkdir -p "${staging}/wwwroot"
          bash scripts/sync-publish-wwwroot.sh server "${staging}/wwwroot"
          test -f "${staging}/wwwroot/admin.html"
          test -f "${staging}/wwwroot/index.html"
          test -f "${staging}/wwwroot/ai.html"
          test -f "${staging}/wwwroot/js/admin-testing-mode.js"
          test -f "${staging}/status-wwwroot/index.html"
          test -f "${staging}/status-wwwroot/ai.html"
          test -f "${staging}/wwwroot/css/docs.css"
          echo "Deploying status + portal + docs wwwroot to ${www_target} and ${status_target}"
          rsync_common=( -avz --delete )
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${rsync_common[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${staging}/wwwroot/" \
              "$www_target"
            rsync "${rsync_common[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${staging}/status-wwwroot/" \
              "$status_target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${rsync_common[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${staging}/wwwroot/" \
              "$www_target"
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${rsync_common[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${staging}/status-wwwroot/" \
              "$status_target"
          fi

      - name: Update server git checkout
        continue-on-error: true
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }
          repo_rsync_args=(
            -az
            --delete
            --exclude '.git/'
            --exclude 'server/publish/'
            --exclude 'server/publish-*/'
            --exclude 'server/**/bin/'
            --exclude 'server/**/obj/'
            --exclude 'server/Theexonet.Api/html/uploads/'
            --exclude 'server/Theexonet.Api/*.dll'
            --exclude 'server/Theexonet.Api/publish/'
          )
          echo "Rsyncing repository sources to ${DEPLOY_REPO_PATH} (${GITHUB_SHA})"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${repo_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              ./ \
              "${remote}:${DEPLOY_REPO_PATH}/"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${repo_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              ./ \
              "${remote}:${DEPLOY_REPO_PATH}/"
          fi
          run_remote "test -f '${DEPLOY_REPO_PATH}/server/Theexonet.Api/Theexonet.Api.csproj'"
          run_remote "printf '%s\\n' '${GITHUB_SHA}' > '${DEPLOY_REPO_PATH}/.deploy-commit'"
          echo "Server sources updated at ${DEPLOY_REPO_PATH}"

      - name: Fix portal wwwroot ownership
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            chown_cmd="chown -R theexonet:theexonet '${DEPLOY_API_PATH}/wwwroot'"
          else
            chown_cmd="sudo chown -R theexonet:theexonet '${DEPLOY_API_PATH}/wwwroot'"
          fi
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$chown_cmd"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$chown_cmd"
          fi

      - name: Fix publish permissions for theexonet
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            sudo_prefix=""
          else
            sudo_prefix="sudo "
          fi
          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }
          if run_remote "command -v fix-theexonet-permissions >/dev/null 2>&1"; then
            run_remote "${sudo_prefix}fix-theexonet-permissions -q"
          else
            run_remote "${sudo_prefix}chmod a+rx '${DEPLOY_API_PATH}' && ${sudo_prefix}find '${DEPLOY_API_PATH}' -maxdepth 1 -type f \\( -name '*.dll' -o -name '*.json' \\) -exec chmod a+r {} +"
          fi

      - name: Restart services
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            sudo_prefix=""
          else
            sudo_prefix="sudo "
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          restart_unit() {
            local unit="$1"
            if [ -z "$unit" ]; then
              return 0
            fi
            if ! run_remote "${sudo_prefix}systemctl cat ${unit}.service >/dev/null 2>&1"; then
              echo "WARNING: ${unit}.service is not installed on the server; skipping restart."
              echo "Run sudo install-theexonet-systemd on the server (see docs/deploy.md)."
              return 0
            fi
            if run_remote "${sudo_prefix}systemctl restart ${unit}"; then
              echo "Restarted ${unit}"
            else
              echo "WARNING: systemctl restart ${unit} failed (deploy files were still synced)." >&2
            fi
          }

          if run_remote "command -v restart-theexonet >/dev/null 2>&1"; then
            if run_remote "${sudo_prefix}restart-theexonet"; then
              echo "Restarted services via restart-theexonet"
            else
              echo "WARNING: restart-theexonet failed; trying individual service restarts." >&2
              restart_unit "${DEPLOY_API_SERVICE}"
              restart_unit "${DEPLOY_STATUS_SERVICE}"
              restart_unit "${DEPLOY_ADMIN_SERVICE}"
              restart_unit "${DEPLOY_MODERATOR_SERVICE}"
              restart_unit "${DEPLOY_DOCS_SERVICE}"
            fi
          else
            echo "WARNING: restart-theexonet not found; falling back to systemctl restart." >&2
            restart_unit "${DEPLOY_API_SERVICE}"
            restart_unit "${DEPLOY_STATUS_SERVICE}"
            restart_unit "${DEPLOY_ADMIN_SERVICE}"
            restart_unit "${DEPLOY_MODERATOR_SERVICE}"
            restart_unit "${DEPLOY_DOCS_SERVICE}"
          fi

      - name: Install helper scripts
        continue-on-error: true
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            sudo_prefix=""
          else
            sudo_prefix="sudo "
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          repo_scripts="${DEPLOY_REPO_PATH}/scripts"
          if run_remote "test -f '${repo_scripts}/install-bin-scripts.sh'"; then
            echo "Installing helper scripts from ${repo_scripts}"
            run_remote "${sudo_prefix}bash '${repo_scripts}/install-bin-scripts.sh' '${repo_scripts}'"
          else
            staging="/tmp/theexonet-scripts-install"
            echo "Repo scripts missing — syncing scripts/ to ${remote}:${staging}"
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              rsync -az --delete scripts/ \
                -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
                "${remote}:${staging}/"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" rsync -az --delete scripts/ \
                -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
                "${remote}:${staging}/"
            fi
            run_remote "${sudo_prefix}bash ${staging}/install-bin-scripts.sh ${staging}"
          fi
          echo "Installed /usr/local/bin/restart-theexonet and related helpers."

      - name: Verify portal assets on server
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            sudo_prefix=""
          else
            sudo_prefix="sudo "
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          verify_file() {
            local label="$1"
            local path="$2"
            if ! run_remote "test -f '${path}'"; then
              echo "ERROR: ${label} missing at ${path}" >&2
              run_remote "ls -la '${DEPLOY_API_PATH}/wwwroot/js' '${DEPLOY_API_PATH}/wwwroot/images' 2>&1 || true"
              exit 1
            fi
            echo "${label}: on disk"
          }

          verify_file "Admin admin.html" "${DEPLOY_API_PATH}/wwwroot/admin.html"
          verify_file "Admin currency.js" "${DEPLOY_API_PATH}/wwwroot/js/currency.js"
          verify_file "Admin admin-testing-mode.js" "${DEPLOY_API_PATH}/wwwroot/js/admin-testing-mode.js"
          verify_file "Admin currency.png" "${DEPLOY_API_PATH}/wwwroot/images/currency.png"
          verify_file "Game currency.png" "${DEPLOY_API_PATH}/html/images/currency.png"
          verify_file "Status index.html" "${DEPLOY_API_PATH}/status-wwwroot/index.html"
          verify_file "Status ai.html" "${DEPLOY_API_PATH}/status-wwwroot/ai.html"
          verify_file "Status favicon.svg" "${DEPLOY_API_PATH}/status-wwwroot/favicon.svg"
          verify_file "Docs docs.css" "${DEPLOY_API_PATH}/wwwroot/css/docs.css"
          verify_file "Docs content index" "${DEPLOY_API_PATH}/content/index.md"

          wait_for_active() {
            local unit="$1"
            local attempt=1
            while [ "$attempt" -le 24 ]; do
              local state
              state="$(run_remote "systemctl is-active ${unit} 2>/dev/null || true")"
              if [ "$state" = "active" ]; then
                echo "${unit}: active"
                return 0
              fi
              if [ "$state" = "failed" ]; then
                echo "ERROR: ${unit} failed to start" >&2
                run_remote "${sudo_prefix}journalctl -u ${unit} -n 40 --no-pager 2>&1 || true"
                return 1
              fi
              echo "${unit}: ${state:-unknown} (attempt ${attempt}/24)..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "ERROR: ${unit} did not reach active state" >&2
            run_remote "${sudo_prefix}journalctl -u ${unit} -n 40 --no-pager 2>&1 || true"
            return 1
          }

          for unit in "${DEPLOY_ADMIN_SERVICE}" "${DEPLOY_MODERATOR_SERVICE}" "${DEPLOY_DOCS_SERVICE}"; do
            if [ -n "$unit" ]; then
              wait_for_active "$unit" || exit 1
            fi
          done

          verify_http() {
            local label="$1"
            local url="$2"
            local attempt=1
            while [ "$attempt" -le 12 ]; do
              if run_remote "curl -sf -o /dev/null '${url}'"; then
                echo "${label}: HTTP OK"
                return 0
              fi
              echo "${label}: waiting for HTTP (attempt ${attempt}/12)..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "ERROR: ${label} not served at ${url}" >&2
            run_remote "systemctl is-active ${DEPLOY_ADMIN_SERVICE} ${DEPLOY_MODERATOR_SERVICE} ${DEPLOY_DOCS_SERVICE} 2>&1 || true"
            run_remote "command -v diagnose-theexonet-portals >/dev/null 2>&1 && ${sudo_prefix}diagnose-theexonet-portals || ${sudo_prefix}journalctl -u ${DEPLOY_ADMIN_SERVICE} -n 25 --no-pager 2>&1 || true"
            exit 1
          }

          verify_http "Admin currency.js" "http://127.0.0.1:7000/js/currency.js"
          verify_http "Admin admin-testing-mode.js" "http://127.0.0.1:7000/js/admin-testing-mode.js"
          verify_http "Moderator currency.js" "http://127.0.0.1:7050/js/currency.js"
          verify_http "Docs CSS" "http://127.0.0.1:9000/css/docs.css"
