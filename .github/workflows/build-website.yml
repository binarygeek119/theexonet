name: Build website

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/build-website.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.tag }}
      release_date: ${{ steps.meta.outputs.date }}
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set release tag
        id: meta
        if: github.event_name != 'pull_request'
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          TAG="website-${DATE}-${{ github.run_number }}"
          echo "date=${DATE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          include-prerelease: true

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Rava.slnx

      - name: Build
        run: dotnet build Rava.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Rava.slnx --configuration Release --no-build --verbosity normal

      - name: Publish web app
        run: dotnet publish Rava.Api/Rava.Api.csproj --configuration Release --output ./publish

      - name: Upload publish artifact
        uses: actions/upload-artifact@v4
        with:
          name: rava-website
          path: server/publish/
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download publish artifact
        uses: actions/download-artifact@v4
        with:
          name: rava-website
          path: publish

      - name: Create release archive
        run: zip -r "rava-website-${{ needs.build.outputs.release_tag }}.zip" publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.release_tag }}
          name: Website ${{ needs.build.outputs.release_tag }}
          body: |
            Automated website release.

            - **Tag:** `${{ needs.build.outputs.release_tag }}`
            - **Date (UTC):** ${{ needs.build.outputs.release_date }}
            - **Build number:** ${{ github.run_number }}
            - **Commit:** ${{ github.sha }}
            - **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            Download `rava-website-*.zip`, extract it, and run `Rava.Api` with your production configuration (`appsettings.json`, database connection, etc.).
          files: rava-website-*.zip
          generate_release_notes: true
