name: Deploy game html and portals

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "server/Rava.Api/html/**"
      - "server/Rava.Admin/**"
      - "server/Rava.Moderator/**"
      - "server/Rava.Status/**"
      - "scripts/deploy-html.sh"
      - "scripts/deploy-portals.sh"
      - "scripts/deploy-status.sh"
      - "scripts/sync-portal-wwwroot.sh"
      - ".github/workflows/deploy-html.yml"

permissions:
  contents: read

jobs:
  deploy-html:
    name: Sync html, status, and admin/moderator portals
    runs-on: ubuntu-latest
    environment: production
    env:
      DEPLOY_HOST: ${{ vars.DEPLOY_HOST || secrets.DEPLOY_HOST || 'binarygeek119.duckdns.org' }}
      DEPLOY_USER: ${{ vars.DEPLOY_USER || secrets.DEPLOY_USER || 'root' }}
      DEPLOY_SSH_PORT: ${{ vars.DEPLOY_SSH_PORT || secrets.DEPLOY_SSH_PORT || '22' }}
      DEPLOY_API_PATH: ${{ vars.DEPLOY_API_PATH || secrets.DEPLOY_API_PATH || '/var/www/publish' }}
      DEPLOY_API_HOST: ${{ vars.DEPLOY_API_HOST || secrets.DEPLOY_API_HOST || '' }}
      DEPLOY_STATUS_SERVICE: ${{ vars.DEPLOY_STATUS_SERVICE || secrets.DEPLOY_STATUS_SERVICE || 'rava-status' }}
      DEPLOY_ADMIN_SERVICE: ${{ vars.DEPLOY_ADMIN_SERVICE || secrets.DEPLOY_ADMIN_SERVICE || 'rava-admin' }}
      DEPLOY_MODERATOR_SERVICE: ${{ vars.DEPLOY_MODERATOR_SERVICE || secrets.DEPLOY_MODERATOR_SERVICE || 'rava-moderator' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate web JavaScript
        run: |
          node --check server/Rava.Api/html/js/api.js
          node --check server/Rava.Api/html/js/app.js
          node --check server/Rava.Api/html/js/exonet.js
          node --check server/Rava.Api/html/js/admin.js
          node --check server/Rava.Api/html/js/moderator.js
          node --check server/Rava.Api/html/js/currency.js
          node --check server/Rava.Status/wwwroot/js/status.js
          node --check server/Rava.Status/wwwroot/js/values.js

      - name: Detect deploy auth method
        id: auth
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -n "$DEPLOY_SSH_KEY" ]; then
            echo "method=key" >> "$GITHUB_OUTPUT"
          elif [ -n "$DEPLOY_SSH_PASSWORD" ]; then
            echo "method=password" >> "$GITHUB_OUTPUT"
          else
            echo "Configure DEPLOY_SSH_KEY or DEPLOY_SSH_PASSWORD in repository secrets." >&2
            exit 1
          fi

      - name: Setup SSH (key)
        if: steps.auth.outputs.method == 'key'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Setup SSH (password)
        if: steps.auth.outputs.method == 'password'
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Normalize deploy settings
        run: |
          set -euo pipefail
          normalize_host() {
            local h="${1:-}"
            h="${h#https://}"
            h="${h#http://}"
            h="${h%%/*}"
            h="${h%%:*}"
            h="$(printf '%s' "$h" | tr -d '[:space:]')"
            printf '%s' "$h"
          }
          host="$(normalize_host "$DEPLOY_HOST")"
          api_host="$(normalize_host "${DEPLOY_API_HOST:-}")"
          [ -n "$host" ] || { echo "DEPLOY_HOST is empty." >&2; exit 1; }
          echo "DEPLOY_HOST=$host" >> "$GITHUB_ENV"
          echo "DEPLOY_API_HOST=$api_host" >> "$GITHUB_ENV"
          port="$(printf '%s' "$DEPLOY_SSH_PORT" | tr -d '[:space:]')"
          echo "DEPLOY_SSH_PORT=$port" >> "$GITHUB_ENV"
          path="$(printf '%s' "$DEPLOY_API_PATH" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//' -e 's:/*$::')"
          [ "$path" = "/var/www" ] && { echo "Use /var/www/publish, not /var/www." >&2; exit 1; }
          echo "DEPLOY_API_PATH=$path" >> "$GITHUB_ENV"

      - name: Add SSH host key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          ssh-keyscan -T 15 -H -p "$DEPLOY_SSH_PORT" "$host" >> ~/.ssh/known_hosts

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Publish status, admin, and moderator
        working-directory: server
        run: |
          set -euo pipefail
          dotnet publish Rava.Status/Rava.Status.csproj --configuration Release --output ./publish-status
          dotnet publish Rava.Admin/Rava.Admin.csproj --configuration Release --output ./publish-admin
          dotnet publish Rava.Moderator/Rava.Moderator.csproj --configuration Release --output ./publish-moderator
          test -f publish-status/Rava.Status.dll
          test -f publish-status/wwwroot/js/status.js
          test -f publish-admin/Rava.Admin.dll
          test -f publish-moderator/Rava.Moderator.dll
          test -f publish-admin/wwwroot/js/currency.js
          test -f publish-moderator/wwwroot/js/currency.js
          bash ../scripts/sync-portal-wwwroot.sh Rava.Api/html publish-admin/wwwroot
          bash ../scripts/sync-portal-wwwroot.sh Rava.Api/html publish-moderator/wwwroot

      - name: Deploy game html
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          target="${remote}:${DEPLOY_API_PATH}/html/"
          html_rsync_args=(
            -avz
            --exclude 'uploads/'
            --exclude 'images/profile/'
            --exclude 'images/profile-backgrounds/'
            --exclude 'exonet/offworld-news/editions/'
            --exclude 'exonet/offworld-news/images/'
          )
          echo "Deploying server/Rava.Api/html/ to ${target}"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${html_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Rava.Api/html/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${html_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/Rava.Api/html/ \
              "$target"
          fi

      - name: Deploy status, admin, and moderator
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          target="${remote}:${DEPLOY_API_PATH}/"
          portal_rsync_args=(
            -avz
            --exclude 'appsettings.json'
            --exclude 'appsettings.Development.json'
            --exclude 'status-runtime.json'
            --filter 'P status-runtime.json'
          )
          echo "Deploying status dashboard to ${target}"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync "${portal_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/publish-status/ \
              "$target"
            rsync "${portal_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/publish-admin/ \
              "$target"
            rsync "${portal_rsync_args[@]}" \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/publish-moderator/ \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${portal_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/publish-status/ \
              "$target"
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${portal_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/publish-admin/ \
              "$target"
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync "${portal_rsync_args[@]}" \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              server/publish-moderator/ \
              "$target"
          fi

      - name: Deploy portal wwwroot assets from checkout
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          target="${remote}:${DEPLOY_API_PATH}/wwwroot/"
          staging="$(mktemp -d)"
          bash scripts/sync-portal-wwwroot.sh server/Rava.Api/html "$staging"
          echo "Deploying portal wwwroot assets to ${target}"
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            rsync -avz \
              -e "ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${staging}/" \
              "$target"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" rsync -avz \
              -e "sshpass -e ssh -p ${DEPLOY_SSH_PORT} -o StrictHostKeyChecking=yes" \
              "${staging}/" \
              "$target"
          fi

      - name: Fix portal wwwroot ownership
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            chown_cmd="chown -R www-data:www-data '${DEPLOY_API_PATH}/wwwroot'"
          else
            chown_cmd="sudo chown -R www-data:www-data '${DEPLOY_API_PATH}/wwwroot'"
          fi
          if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
            ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$chown_cmd"
          else
            SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$chown_cmd"
          fi

      - name: Restart status, admin, and moderator services
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"
          if [ "$DEPLOY_USER" = "root" ]; then
            sudo_prefix=""
          else
            sudo_prefix="sudo "
          fi

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          restart_unit() {
            local unit="$1"
            if [ -z "$unit" ]; then
              return 0
            fi
            if ! run_remote "${sudo_prefix}systemctl cat ${unit}.service >/dev/null 2>&1"; then
              echo "WARNING: ${unit}.service is not installed; skipping restart."
              return 0
            fi
            if run_remote "${sudo_prefix}systemctl restart ${unit}"; then
              echo "Restarted ${unit}"
            else
              echo "WARNING: systemctl restart ${unit} failed (portal files were still synced)." >&2
            fi
          }

          restart_unit "${DEPLOY_STATUS_SERVICE}"
          restart_unit "${DEPLOY_ADMIN_SERVICE}"
          restart_unit "${DEPLOY_MODERATOR_SERVICE}"

          if run_remote "command -v curl >/dev/null 2>&1"; then
            run_remote "curl -sf -o /dev/null -w 'status dashboard HTTP %{http_code}\n' http://127.0.0.1:6000/ || true"
            run_remote "curl -sf -o /dev/null -w 'admin currency.js HTTP %{http_code}\n' http://127.0.0.1:7000/js/currency.js || true"
            run_remote "curl -sf -o /dev/null -w 'admin currency.svg HTTP %{http_code}\n' http://127.0.0.1:7000/images/currency.svg || true"
            run_remote "curl -sf -o /dev/null -w 'moderator currency.js HTTP %{http_code}\n' http://127.0.0.1:7050/js/currency.js || true"
          fi

          echo "Done. Hard-refresh status/admin/moderator sites after deploy."

      - name: Verify portal assets on server
        env:
          DEPLOY_SSH_PASSWORD: ${{ secrets.DEPLOY_SSH_PASSWORD }}
        run: |
          set -euo pipefail
          api_host="${DEPLOY_API_HOST:-$DEPLOY_HOST}"
          remote="${DEPLOY_USER}@${api_host}"

          run_remote() {
            if [ "${{ steps.auth.outputs.method }}" = "key" ]; then
              ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            else
              SSHPASS="$DEPLOY_SSH_PASSWORD" sshpass -e \
                ssh -p "$DEPLOY_SSH_PORT" -o StrictHostKeyChecking=yes "$remote" "$1"
            fi
          }

          verify_file() {
            local label="$1"
            local path="$2"
            if ! run_remote "test -f '${path}'"; then
              echo "ERROR: ${label} missing at ${path}" >&2
              run_remote "ls -la '${DEPLOY_API_PATH}/wwwroot/js' '${DEPLOY_API_PATH}/wwwroot/images' 2>&1 || true"
              exit 1
            fi
            echo "${label}: on disk"
          }

          verify_file "Admin currency.js" "${DEPLOY_API_PATH}/wwwroot/js/currency.js"
          verify_file "Admin currency.svg" "${DEPLOY_API_PATH}/wwwroot/images/currency.svg"

          verify_http() {
            local label="$1"
            local url="$2"
            local attempt=1
            while [ "$attempt" -le 12 ]; do
              if run_remote "curl -sf -o /dev/null '${url}'"; then
                echo "${label}: HTTP OK"
                return 0
              fi
              echo "${label}: waiting for service (attempt ${attempt}/12)..."
              sleep 5
              attempt=$((attempt + 1))
            done
            echo "ERROR: ${label} not served at ${url}" >&2
            run_remote "systemctl is-active ${DEPLOY_ADMIN_SERVICE} ${DEPLOY_MODERATOR_SERVICE} 2>&1 || true"
            run_remote "journalctl -u ${DEPLOY_ADMIN_SERVICE} -n 20 --no-pager 2>&1 || true"
            exit 1
          }

          verify_http "Admin currency.js" "http://127.0.0.1:7000/js/currency.js"
          verify_http "Admin currency.svg" "http://127.0.0.1:7000/images/currency.svg"
          verify_http "Moderator currency.js" "http://127.0.0.1:7050/js/currency.js"
