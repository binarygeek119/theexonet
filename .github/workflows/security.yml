name: Security

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: NuGet vulnerability audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Rava.slnx

      - name: List vulnerable packages
        continue-on-error: true
        run: dotnet list Rava.slnx package --vulnerable --include-transitive

      - name: Fail on vulnerable packages
        run: dotnet build Rava.slnx --configuration Release --no-restore -warnaserror:NU1901;NU1902;NU1903;NU1904

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Build
        run: dotnet build server/Rava.slnx --configuration Release

      - name: Analyze
        uses: github/codeql-action/analyze@v4
