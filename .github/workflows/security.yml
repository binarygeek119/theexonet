name: Security

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: NuGet vulnerability audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Rava.slnx

      - name: List vulnerable packages
        continue-on-error: true
        run: dotnet list Rava.slnx package --vulnerable --include-transitive

      - name: Fail on vulnerable packages
        run: dotnet build Rava.slnx --configuration Release --no-restore

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Build
        run: dotnet build server/Rava.slnx --configuration Release

      # Run CodeQL CLI directly instead of github/codeql-action/analyze, which calls
      # GitHub workflow-run APIs for SARIF fingerprints/telemetry and fails when code
      # scanning is not enabled on the repository.
      - name: Run CodeQL analysis
        run: |
          mkdir -p codeql-results
          codeql database finalize "$RUNNER_TEMP/codeql_databases/csharp"
          codeql database analyze "$RUNNER_TEMP/codeql_databases/csharp" \
            --format=sarif-latest \
            --output=codeql-results/csharp.sarif \
            --threads="${CODEQL_THREADS:-2}" \
            --ram="${CODEQL_RAM:-6144}"

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v7
        with:
          name: codeql-sarif
          path: codeql-results/
          if-no-files-found: warn
