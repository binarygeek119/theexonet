name: Security

on:
  push:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
  pull_request:
    branches: [main]
    paths:
      - "server/**"
      - ".github/workflows/security.yml"
      - "server/Directory.Build.props"
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  dependency-audit:
    name: NuGet vulnerability audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('server/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore Rava.slnx

      - name: List vulnerable packages
        continue-on-error: true
        run: dotnet list Rava.slnx package --vulnerable --include-transitive

      - name: Fail on vulnerable packages
        run: dotnet build Rava.slnx --configuration Release --no-restore

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Build
        run: dotnet build server/Rava.slnx --configuration Release

      # upload:false — GitHub code scanning must be enabled under repo Settings →
      # Code security and analysis before SARIF can be posted to the Security tab.
      # Results are kept as a workflow artifact until then.
      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          upload: false
          output: codeql-results

      - name: Upload SARIF artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif
          path: codeql-results/
          if-no-files-found: ignore
