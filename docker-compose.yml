services:
  postgres:
    image: postgres:16-alpine
    container_name: theexonet-postgres
    environment:
      POSTGRES_USER: theexonet
      POSTGRES_PASSWORD: theexonet_dev
      POSTGRES_DB: theexonet
    ports:
      - "5432:5432"
    volumes:
      - theexonet_pgdata:/var/lib/postgresql/data

volumes:
  theexonet_pgdata:
