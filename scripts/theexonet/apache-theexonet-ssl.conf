# HTTPS vhosts for theexonet.com — installed to /etc/apache2/sites-available/theexonet-le-ssl.conf
# after Let's Encrypt (install-ssl-certs.sh). Replace @@DOMAIN@@ before enable.

<VirtualHost *:443>
    ServerName @@DOMAIN@@
    ServerAlias www.@@DOMAIN@@
    DocumentRoot /var/www/publish/html

    <Directory /var/www/publish/html>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/@@DOMAIN@@/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/@@DOMAIN@@/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ErrorLog ${APACHE_LOG_DIR}/theexonet-game-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/theexonet-game-ssl-access.log combined
</VirtualHost>

<VirtualHost *:443>
    ServerName api.@@DOMAIN@@

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/@@DOMAIN@@/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/@@DOMAIN@@/privkey.pem
    Include /etc/letsencrypt/options-ssl-apache.conf

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/

    ErrorLog ${APACHE_LOG_DIR}/theexonet-api-ssl-error.log
    CustomLog ${APACHE_LOG_DIR}/theexonet-api-ssl-access.log combined
</VirtualHost>

