# Apache vhosts for theexonet.com — installed to /etc/apache2/sites-available/theexonet.conf
# Replace @@DOMAIN@@ before enable (install-host-server.sh does this).

<VirtualHost *:80>
    ServerName @@DOMAIN@@
    ServerAlias www.@@DOMAIN@@
    DocumentRoot /var/www/publish/html

    <Directory /var/www/publish/html>
        Options FollowSymLinks
        AllowOverride None
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/theexonet-game-error.log
    CustomLog ${APACHE_LOG_DIR}/theexonet-game-access.log combined
</VirtualHost>

<VirtualHost *:80>
    ServerName api.@@DOMAIN@@
    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "http"
    ProxyPass / http://127.0.0.1:5000/
    ProxyPassReverse / http://127.0.0.1:5000/
    ErrorLog ${APACHE_LOG_DIR}/theexonet-api-error.log
    CustomLog ${APACHE_LOG_DIR}/theexonet-api-access.log combined
</VirtualHost>

